name: Android

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Test and Assemble Android
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Test and assemble release
        run: scripts/build-android.sh
