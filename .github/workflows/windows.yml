name: Windows

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Test Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Restore active Windows app
        working-directory: apps/windows
        run: dotnet restore src/BeamDrop.Windows.App/BeamDrop.Windows.App.csproj

      - name: Build active Windows app
        working-directory: apps/windows
        run: dotnet build src/BeamDrop.Windows.App/BeamDrop.Windows.App.csproj --no-restore

      - name: Restore Windows tests
        working-directory: apps/windows
        run: dotnet restore Tests/BeamDrop.Windows.Tests/BeamDrop.Windows.Tests.csproj

      - name: Build Windows tests
        working-directory: apps/windows
        run: dotnet build Tests/BeamDrop.Windows.Tests/BeamDrop.Windows.Tests.csproj --no-restore

      - name: Run Windows tests
        working-directory: apps/windows
        run: dotnet run --project Tests/BeamDrop.Windows.Tests/BeamDrop.Windows.Tests.csproj --no-build
