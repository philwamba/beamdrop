name: Core Rust, Protocol, and Server

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Rust, Protocol, and Server Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test Rust workspace and validate protocol schemas
        working-directory: core/beamdrop-core
        run: cargo test --workspace

      - name: Validate protocol JSON syntax
        run: find protocol/beamdrop-protocol -name '*.json' -print0 | xargs -0 -n1 python3 -m json.tool > /dev/null

      - name: Test and build signaling service
        working-directory: server/beamdrop-signaling
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Test and build relay service
        working-directory: server/beamdrop-relay
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build
