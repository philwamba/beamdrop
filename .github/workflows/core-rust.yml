name: Core Rust

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Cargo Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust workspace
        working-directory: core/beamdrop-core
        run: cargo test --workspace
